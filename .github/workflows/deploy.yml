name: Auto Deploy Bazenga Web App on VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Deploy to VPS via SSH
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DB_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22

          script: |
            set -e

            echo "🚀 Starting deployment..."

            # Navigate to project
            cd apps/bazenga/e_mauzo_web

            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "🧹 Cleaning Docker environment..."
            docker stop bazenga_pos || true
            docker rm bazenga_pos || true

            # remove old image (IMPORTANT FIX)
            docker rmi bazenga_pos:latest || true

            echo "🏗️ Building fresh Docker image (NO CACHE)..."
            docker build \
              --no-cache \
              --pull \
              --build-arg NEXT_PUBLIC_HOST="${{ secrets.NEXT_PUBLIC_HOST }}" \
              -t bazenga_pos:latest .

            echo "🚀 Starting container..."
            docker run -d \
              --name bazenga_pos \
              -p 3001:3001 \
              --restart unless-stopped \
              -e NEXT_PUBLIC_HOST="${{ secrets.NEXT_PUBLIC_HOST }}" \
              bazenga_pos:latest

            echo "✅ Deployment complete!"